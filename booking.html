<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishi Tours & Travels - Luxury Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
width:100%;
max-width:1100px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
color:#FFD700;
font-size:40px;
font-weight:700;
}

.logo p{
color:#fff;
font-size:15px;
letter-spacing:2px;
}

.heading{
text-align:center;
margin:30px 0;
}

.heading h2{
color:#fff;
font-size:30px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
color:#fff;
margin-bottom:8px;
font-size:14px;
font-weight:500;
}

.input-group input,
.input-group select,
.input-group textarea{
padding:15px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
outline:none;
}

.input-group input::placeholder,
textarea::placeholder{
color:#d1d5db;
}

textarea{
height:120px;
resize:none;
}

.full-width{
grid-column:1/-1;
}

.submit-btn{
margin-top:30px;
width:100%;
padding:18px;
background:linear-gradient(90deg,#FFD700,#F59E0B);
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,215,0,0.3);
}

.footer{
text-align:center;
margin-top:20px;
color:#cbd5e1;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>Rishi Tours & Travels</h1>
<p>Luxury Cab Booking System</p>
</div>

<div class="heading">
<h2>Customer Booking Form</h2>
</div>

<form>

<div class="form-grid">

<div class="input-group">
<label>Client Name</label>
<input type="text" placeholder="Enter Client Name">
</div>

<div class="input-group">
<label>Client Mobile Number</label>
<input type="tel" placeholder="Enter Mobile Number">
</div>

<div class="input-group">
<label>Cab Type</label>
<select>
<option>Select Cab</option>
<option>Sedan</option>
<option>SUV</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
<option>Tempo Traveller</option>
<option>Luxury Car</option>
</select>
</div>

<div class="input-group">
<label>Journey Date</label>
<input type="date">
</div>

<div class="input-group">
<label>Pickup Time</label>
<input type="time">
</div>

<div class="input-group">
<label>Service Type</label>
<select>
<option>Select Service</option>
<option>One Way Drop</option>
<option>Pickup & Drop</option>
<option>Outstation</option>
<option>Local Movement</option>
<option>Wedding Purpose</option>
<option>Airport Transfer</option>
</select>
</div>

<div class="input-group">
<label>Pickup Location</label>
<input type="text" placeholder="Enter Pickup Location">
</div>

<div class="input-group">
<label>Drop Location</label>
<input type="text" placeholder="Enter Drop Location">
</div>

<div class="input-group">
<label>Total Passengers</label>
<input type="number" placeholder="Number of Passengers">
</div>

<div class="input-group">
<label>Luggage Details</label>
<input type="text" placeholder="Luggage Information">
</div>

<div class="input-group full-width">
<label>Special Requirements</label>
<textarea placeholder="Any Special Instructions"></textarea>
</div>

</div>

<button type="submit" class="submit-btn">
Confirm Luxury Booking
</button>

</form>

<div class="footer">
© 2026 Rishi Tours & Travels | Premium Travel Experience
</div>

</div>

</body>
</html>
