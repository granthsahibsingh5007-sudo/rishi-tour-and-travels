<input type="text" id="name" placeholder="Customer Name">

<input type="tel" id="mobile" placeholder="Mobile Number">

<select id="vehicle">
    <option>Sedan</option>
    <option>SUV (Ertiga)</option>
    <option>SUV (Innova)</option>
    <option>SUV (Crysta)</option>
    <option>Force Traveller</option>
    <option>Bus</option>
</select>

<select id="service">
    <option>One Way Drop</option>
    <option>Round Trip</option>
    <option>Airport Transfer</option>
    <option>Local Cab</option>
    <option>Outstation Tour</option>
</select>

<input type="text" id="pickup" placeholder="Pickup Location">

<input type="text" id="drop" placeholder="Drop Location">

<input type="date" id="date">

<input type="time" id="time">

<button id="bookBtn">
    BOOK NOW
</button>
