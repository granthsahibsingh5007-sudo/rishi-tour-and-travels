<!DOCTYPE html>
<html>

<head>

<title>
Rishi Tours & Travels
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<section class="hero">

<div class="overlay">

<h1>
Rishi Tours & Travels
</h1>

<p>
Luxury Cab Booking
</p>

</div>

</section>

<div class="container">

<div class="form-box">

<form id="bookingForm">

<div class="grid">

<input
id="customerName"
placeholder="Customer Name"
required>

<input
id="customerPhone"
placeholder="Mobile Number"
required>

<select id="cabType">

<option>
Sedan
</option>

<option>
SUV
</option>

<option>
Innova
</option>

<option>
Innova Crysta
</option>

<option>
Tempo Traveller
</option>

</select>

<select id="serviceType">

<option>
One Way Drop
</option>

<option>
Pickup & Drop
</option>

<option>
Airport Transfer
</option>

<option>
Outstation
</option>

<option>
Wedding Purpose
</option>

</select>

<input
type="date"
id="journeyDate"
required>

<input
type="time"
id="journeyTime"
required>

<input
id="pickup"
placeholder="Pickup Location"
required>

<input
id="drop"
placeholder="Drop Location"
required>

</div>

<button type="submit">

BOOK NOW

</button>

</form>

</div>

</div>

<script src="js/booking.js"></script>

</body>

</html>
