<!-- WELCOME SCREEN -->

<div id="welcomeScreen" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#001d3d,#003566,#00509d);
z-index:9999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
transition:0.5s;
">

<div style="
font-size:38px;
font-weight:700;
color:white;
text-align:center;
line-height:55px;
padding:20px;
">
Welcome To <br>
Rishi Tour & Travels
</div>

<div style="
margin-top:20px;
background:rgba(255,255,255,0.15);
padding:14px 22px;
border-radius:50px;
color:white;
font-size:16px;
backdrop-filter:blur(10px);
">
Premium Cab Booking Service
</div>

<div style="
position:absolute;
bottom:60px;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-size:14px;
animation:slideAnim 1.2s infinite;
">

<div style="
font-size:18px;
margin-bottom:8px;
">
👉 Swipe Right To Continue
</div>

<div style="
width:80px;
height:4px;
background:white;
border-radius:10px;
"></div>

</div>

</div>

<style>

@keyframes slideAnim{
0%{
transform:translateX(0px);
}
50%{
transform:translateX(20px);
}
100%{
transform:translateX(0px);
}
}

</style>

<script>

let startX = 0;

document.getElementById("welcomeScreen")
.addEventListener("touchstart",function(e){

startX = e.touches[0].clientX;

});

document.getElementById("welcomeScreen")
.addEventListener("touchend",function(e){

let endX = e.changedTouches[0].clientX;

if(endX - startX > 120){

document.getElementById("welcomeScreen")
.style.transform = "translateX(100%)";

setTimeout(()=>{

document.getElementById("welcomeScreen")
.style.display="none";

},500);

}

});

</script>
