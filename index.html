    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rishi Tours & Travels | Cab Booking</title>

<link rel="stylesheet" href="css/style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b0014;
color:white;
}

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("hero.jpg") center/cover;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

.booking{
max-width:700px;
margin:30px auto;
padding:25px;
background:#160022;
border-radius:20px;
}

.booking h2{
text-align:center;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#7b2ff7,#ff0080);
color:white;
font-size:16px;
cursor:pointer;
}

.footer{
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<section class="hero">
<h1>Rishi Tours & Travels</h1>
<p>Safe • Comfortable • Reliable Cab Service</p>
</section>

<section class="booking">

<h2>Cab Booking Form</h2>

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Customer Name"
required>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

<select id="cabModel" required>
<option value="">Select Cab</option>
<option>Swift Dzire</option>
<option>Ertiga</option>
<option>Innova</option>
<option>Innova Crysta</option>
</select>

<select id="tripType" required>
<option value="">Trip Type</option>
<option>One Way</option>
<option>Round Trip</option>
<option>Local</option>
<option>Airport</option>
</select>

<input
type="text"
id="pickup"
placeholder="Pickup Location"
required>

<input
type="text"
id="drop"
placeholder="Drop Location"
required>

<input
type="date"
id="date"
required>

<input
type="time"
id="time"
required>

<button type="submit">
Book Now
</button>

</form>

</section>

<div class="footer">
© 2026 Rishi Tours & Travels
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/booking.js"></script>

</body>
</html>
